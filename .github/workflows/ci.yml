name: CI

on:
  push:
    branches: [main, postgre]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov coverage ruff black mypy

      # --- Lint / Format / Types (non-fatal) ---
      - name: Lint (ruff)
        run: ruff check . --output-format=github
        continue-on-error: true

      - name: Format (black, check only)
        run: black --check .
        continue-on-error: true

      - name: Type-check (mypy)
        run: mypy --ignore-missing-imports .
        continue-on-error: true

      # --- Tests + Coverage (produce XML for uploaders) ---
      - name: Run tests
        env:
          APP_ENV: development
          METRICS_ENABLED: "0"
          FLASK_SECRET_KEY: test-secret
          ADMIN_PASSWORD: test-admin
          SEED_DEMO_USERS: "0"
        run: |
          pytest -q --maxfail=1 --disable-warnings \
            --cov --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      # Optional: keep the XML as a downloadable artifact from the run
      - name: Upload coverage.xml artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

      # Codecov: publish coverage to get the badge + history
      - name: Upload to Codecov
        if: always()
        uses: codecov/[email protected]
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
          # For private repos, add a repository secret CODECOV_TOKEN and uncomment:
          # token: ${{ secrets.CODECOV_TOKEN }}
