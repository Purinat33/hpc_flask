name: CI

on:
  push:
    branches: [main, postgre]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov ruff black mypy

      - name: Lint (ruff)
        run: ruff check .

      - name: Format (black, check only)
        run: black --check .

      - name: Type-check (mypy)
        run: mypy --ignore-missing-imports .

      - name: Run tests
        env:
          # Keep tests deterministic/offline
          APP_ENV: development
          METRICS_ENABLED: "0"
          # Provide safe fallbacks if your code reads these:
          FLASK_SECRET_KEY: test-secret
          ADMIN_PASSWORD: test-admin
          SEED_DEMO_USERS: "0"
        run: |
          pytest -q --maxfail=1 --disable-warnings --cov --cov-report=term-missing

      - name: Upload coverage.xml (optional)
        if: always()
        run: |
          coverage xml || true
          echo "If using a coverage service, add its upload step here."
