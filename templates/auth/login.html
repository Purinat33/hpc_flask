{% extends "base.html" %}
{% block title %}{{ _("Sign In") }}{% endblock %}

{% block content %}
<h2 class="page-title">{{ _("Sign In") }}</h2>
<form method="post" action="{{ url_for('auth.login') }}" class="auth-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input name="username" placeholder="username" value="{{ last_username or '' }}" required>
    <input name="password" type="password" placeholder="password" required>

    <div class="auth-actions">
        <button type="submit" class="auth-login-btn">{{ _("Login") }}</button>

        {% if message %}
        <span id="login-msg" aria-live="polite">{{ message }}</span>
        {% endif %}

        <div style="margin-top:.5rem; text-align:center;">
            <a href="{{ config.get('PORTAL_URL', '#') }}" class="muted"
                {% if config.get('PORTAL_URL', '#') != '#' %}target="_blank" rel="noopener noreferrer" {% endif %}>
                {{ _("Register") }}
            </a>
        </div>
    </div>
</form>
{% endblock %}
